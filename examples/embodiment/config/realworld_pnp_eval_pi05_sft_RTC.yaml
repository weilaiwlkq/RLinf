defaults:
  - env/realworld_bin_relocation@env.train
  - env/realworld_bin_relocation@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "4090"
      placement: 0 # Local GPU rank in the 4090 node group (n for the n+1 th GPU)
    env:
      node_group: franka
      placement: 0 # Local robot rank in the franka node group (n for the n+1 th robot)
    rollout:
      node_group: "4090"
      placement: 0 # Local GPU rank in the 4090 node group (n for the n+1 th GPU)
  node_groups:
    - label: "4090" # GPU node group
      node_ranks: 0 # The ranks of the nodes to be included in this group, change this if your training node is not rank 0
    - label: franka
      node_ranks: 1 # Change this if your robot node is not rank 1
      hardware:
        type: Franka
        configs:
          - robot_ip: 10.100.25.2 # Replace with your robot's IP address
            node_rank: 1

runner:
  task_type: embodied
  rtc:
    enabled: True
    min_exec_horizon: 2
    initial_delay_steps: 1
    delay_buffer_size: 8
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "openpi_eval_rtc"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 8000
  max_steps: -1

  only_eval: True
  write_eval_summary: True
  stop_eval_on_keyboard_success: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 1
  reward_coef: 1.0
  staleness_threshold: 1
  behave_weight_threshold: 2

  rollout_epoch: 24
  eval_rollout_epoch: 2 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 2

  adv_type: gae
  loss_type: decoupled_actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0
  # params for generation
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    ignore_terminations: True
    no_gripper: False
    use_spacemouse: False
    chunk_pause_seconds: 0.4
    total_num_envs: 1
    main_image_key: wrist_1
    max_steps_per_rollout_epoch: 200
    max_episode_steps: 200
    data_collection:
      enabled: False
      save_dir: "/path/to/data_collection/pnp_train" # Directory to save rollout data
      export_format: "lerobot"
      only_success: False
    override_cfg:
      is_dummy: False
      use_dense_reward: False
      max_num_steps: 200
      target_ee_pose: TARGET_EE_POSE
      camera_serials: ["CAMERA_SERIAL1", "CAMERA_SERIAL2"]
      use_state_to_grip: True
      binary_gripper_threshold: 0.1
      enable_gripper_penalty: False
      gripper_min_switch_interval_s: 1.0
      enable_gripper_debug: True
      gripper_debug_warn_cmd_latency_s: 0.5
      gripper_debug_warn_readback_lag_s: 0.8
      gripper_debug_warn_flip_window_s: 1.2
      gripper_debug_summary_interval: 20
      gripper_debug_log_path: "/tmp/rlinf_gripper_debug_train.jsonl"

  eval:
    ignore_terminations: False
    no_gripper: False
    use_spacemouse: False
    stop_chunk_on_done: True
    chunk_pause_seconds: 0.
    total_num_envs: 1
    main_image_key: wrist_2
    max_steps_per_rollout_epoch: 200
    max_episode_steps: 300
    override_cfg:
      is_dummy: False
      use_dense_reward: False
      max_num_steps: 300
      target_ee_pose: [ 0.50321888, -0.02118786, 0.00593733, 3.14, 0.0, 0.0]
      camera_serials: ["233622071355", "233522071854"]
      # camera_serials: ['141722075170']
      use_state_to_grip: True
      binary_gripper_threshold: 0.02
      enable_gripper_penalty: False
      gripper_min_switch_interval_s: 0.3
      enable_gripper_debug: False
      gripper_debug_warn_cmd_latency_s: 0.5
      gripper_debug_warn_readback_lag_s: 0.8
      gripper_debug_warn_flip_window_s: 1.2
      gripper_debug_summary_interval: 20
      gripper_debug_log_path: "/tmp/rlinf_gripper_debug_eval.jsonl"
    data_collection:
      enabled: True
      save_dir: "/home/franka/xyq" # Directory to save evaluation data
      export_format: "lerobot"
      only_success: False
      save_debug_media: True
      debug_video_fps: 10

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10 # It's not important for openpi model
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: /home/franka/xyq/ckpts/pi05_pick_red/30000
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 80 # how many samples each GPU processes per sampling step
  global_batch_size: 480 # global batch size must be world_size multiples of local batch size
  seed: 0
  enable_offload: False

  model:
    model_path: /home/franka/xyq/ckpts/pi05_pick_red/30000
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: 8 # interface for the env
    num_steps: 4
    openpi:
      value_after_vlm: True
      config_name: "pi05_franka_pnp"
      num_images_in_input: 2
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True # False for flow_sde, True for flow_noise
      rtc_enabled: ${runner.rtc.enabled}
      rtc_guidance_mode: "approx"
      rtc_guidance_clip: 5.0
    policy_setup: widowx_bridge # It's not important for real world env

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    clip_grad: 1.0
    critic_warmup_steps: 10

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
